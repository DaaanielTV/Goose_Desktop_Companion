# Development Configuration for Goose Desktop Companion

[UI]
window_width=256
window_height=256
always_on_top=True
framerate=60
animation_quality=high
render_quality=2

[ANIMATION]
SubtleAnimations=True
breathing_enabled=True
blinking_enabled=True
breathing_amplitude=2
breathing_frequency=0.05
blink_interval=300
blink_duration=5
animation_speed_multiplier=1.0

[POWERSHELL]
script_path=../Core/GooseCore.ps1
animation_data_polling_interval=16
ipc_timeout=5000

[DEBUG]
debug_mode=False
log_level=INFO
show_hitboxes=False
